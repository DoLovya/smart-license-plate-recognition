project:
  name: smart-license-plate-recognition
  version: 0.1.0

detector:
  backend: ultralytics
  weight_path: algorithms/weights/plate-models/detector/yolo/ccpd-green/v1.0.0/best.pt
  confidence_threshold: 0.3
  nms_threshold: 0.5

recognizer:
  backend: paddleocr
  model_name: PP-OCRv6_medium_rec
  cls_model_dir:
  lang: ch
  input_width: 320
  input_height: 48

runtime:
  device: cpu
  batch_size: 1
