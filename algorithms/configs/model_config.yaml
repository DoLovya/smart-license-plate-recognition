project:
  name: smart-license-plate-recognition
  version: 0.1.0

detector:
  backend: onnxruntime
  weight_path: algorithms/weights/plate_detector.onnx
  confidence_threshold: 0.3
  nms_threshold: 0.5

recognizer:
  backend: paddleocr
  model_dir: algorithms/weights/plate-models/recognizer/paddleocr/pp-ocrv6-small/v1.0.0
  cls_model_dir:
  lang: ch
  input_width: 320
  input_height: 48

runtime:
  device: cpu
  batch_size: 1
